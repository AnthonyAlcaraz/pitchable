<!DOCTYPE html>
<html>
<head>
<title>New Slide Types - 3 Theme Gallery</title>
<style>
body { font-family: system-ui; background: #1a1a2e; color: #eee; margin: 0; padding: 20px; }
h1 { text-align: center; margin-bottom: 30px; }
h2 { color: #3b82f6; border-bottom: 2px solid #3b82f6; padding-bottom: 8px; margin-top: 40px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 40px; }
.card { background: #16213e; border-radius: 8px; overflow: hidden; }
.card img { width: 100%; display: block; }
.card .label { padding: 8px 12px; font-size: 13px; color: #94a3b8; text-align: center; }
.theme-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 8px; }
.theme-header span { text-align: center; font-weight: 600; color: #64748b; font-size: 14px; }
</style>
</head>
<body>
<h1>17 New Slide Types - 3 Themes</h1>
<div class="theme-header">
<span>Pitchable Dark</span>
<span>Light Minimal</span>
<span>McKinsey Executive</span>
</div>
<script>
const types = [
'HOOK','MATRIX_2X2','WATERFALL','FUNNEL','COMPETITIVE_MATRIX','ROADMAP',
'PRICING_TABLE','UNIT_ECONOMICS','SWOT','THREE_PILLARS','BEFORE_AFTER',
'SOCIAL_PROOF','OBJECTION_HANDLER','FAQ','VERDICT','COHORT_TABLE','PROGRESS_TRACKER'
];
const themes = ['pitchable-dark','light-minimal','mckinsey-executive'];
types.forEach((type, i) => {
const num = String(i+1).padStart(2,'0');
const h2 = document.createElement('h2');
h2.textContent = `${num}. ${type}`;
document.body.appendChild(h2);
const grid = document.createElement('div');
grid.className = 'grid';
themes.forEach(theme => {
const card = document.createElement('div');
card.className = 'card';
const img = document.createElement('img');
img.src = `${theme}/slide-${num}-${type}.jpeg`;
img.loading = 'lazy';
card.appendChild(img);
const label = document.createElement('div');
label.className = 'label';
label.textContent = theme;
card.appendChild(label);
grid.appendChild(card);
});
document.body.appendChild(grid);
});
</script>
</body>
</html>
